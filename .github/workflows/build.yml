name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    env:
      CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME || vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      CF_PAGES_BRANCH: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt

      - name: Build sites
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ env.CF_PAGES_PROJECT_NAME }}
          BRANCH_NAME: ${{ env.CF_PAGES_BRANCH }}
        run: |
          set -euo pipefail

          if [[ -z "${PROJECT_NAME}" ]]; then
            echo "Set repository variable CF_PAGES_PROJECT_NAME (or CLOUDFLARE_PAGES_PROJECT_NAME)." >&2
            exit 1
          fi

          args=(pages deploy "dist" --project-name="${PROJECT_NAME}")
          if [[ -n "${BRANCH_NAME}" ]]; then
            args+=(--branch="${BRANCH_NAME}")
          fi

          npx wrangler "${args[@]}"
