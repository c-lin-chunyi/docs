[project]
site_name = "My Docs"
site_url = "https://www.chunyi-lin.com"
extra_css = [
  "stylesheets/fonts.css",
  "stylesheets/radix.css",
  "stylesheets/header.css",
  "stylesheets/footer.css",
]
extra_javascript = [
  "javascripts/footer-theme.js",
]

[project.extra.footer]
author_name = "Chunyi Lin"
years = "2026"
license_name = "CC BY 4.0"
license_url = "https://creativecommons.org/licenses/by/4.0/"
repo_url = "https://github.com/c-lin-chunyi/blog"
orcid = "0009-0008-9762-8705"
pgp_key = "pgp_clin.asc.txt"
pgp_fingerprint = "15C2 CB51 1D1E 1A79 C2B2<br>F5F3 ED31 DE03 7AEF 5C7E"

[project.theme]
variant = "classic"
font = false
custom_dir = "overrides"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "radix-light"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "radix-dark"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
